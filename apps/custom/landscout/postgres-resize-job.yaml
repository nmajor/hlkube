apiVersion: v1
kind: ServiceAccount
metadata:
  name: landscout-db-resizer
  namespace: landscout
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: landscout-db-resizer
  namespace: landscout
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    resourceNames:
      - landscout-db-1
      - landscout-db-2
      - landscout-db-3
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: landscout-db-resizer
  namespace: landscout
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: landscout-db-resizer
subjects:
  - kind: ServiceAccount
    name: landscout-db-resizer
    namespace: landscout
---
apiVersion: batch/v1
kind: Job
metadata:
  name: landscout-db-resize-100gi-v2
  namespace: landscout
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: landscout-db-resizer
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: resize
          image: curlimages/curl:8.14.1
          command: ["/bin/sh", "-ec"]
          args:
            - |
              token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              for pvc in landscout-db-1 landscout-db-2 landscout-db-3; do
                curl --fail-with-body --silent --show-error \
                  --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  -H "Authorization: Bearer ${token}" \
                  -H "Content-Type: application/merge-patch+json" \
                  -X PATCH \
                  --data '{"spec":{"resources":{"requests":{"storage":"100Gi"}}}}' \
                  "https://kubernetes.default.svc/api/v1/namespaces/landscout/persistentvolumeclaims/${pvc}"
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
