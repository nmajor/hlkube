apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: landscout-db-pooler
  namespace: landscout
spec:
  cluster:
    name: landscout-db

  instances: 2
  type: rw

  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "25"
      server_reset_query: "DISCARD ALL"
      server_check_query: "SELECT 1"
      server_check_delay: "30"

  monitoring:
    enablePodMonitor: true
