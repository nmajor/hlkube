apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kuma.nmajor.net`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 80
      middlewares:
        - name: header-transform
          namespace: traefik
  tls: {}
