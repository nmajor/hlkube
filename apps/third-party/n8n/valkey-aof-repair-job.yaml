apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-valkey-aof-repair-20260714-v3
  namespace: n8n
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: n8n-valkey-aof-repair
    spec:
      restartPolicy: OnFailure
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: primary
                  app.kubernetes.io/instance: n8n-valkey
                  app.kubernetes.io/name: valkey
              topologyKey: kubernetes.io/hostname
      containers:
        - name: repair-aof
          image: docker.io/bitnamilegacy/valkey:8.1.2-debian-12-r0
          command: ["/bin/bash", "-ec"]
          args:
            - |
              manifest="$(find /data -name appendonly.aof.manifest -print -quit)"
              test -n "${manifest}"
              source_dir="$(dirname "${manifest}")"
              marker="${source_dir}/.aof-repaired-20260714"

              if [[ -f "${marker}" ]]; then
                echo "AOF repair already completed"
                exit 0
              fi

              backup="${source_dir}/backup-20260714"
              echo "Repairing ${manifest}"
              if [[ ! -e "${backup}" ]]; then
                mkdir "${backup}"
                find "${source_dir}" -maxdepth 1 -type f -exec cp -p {} "${backup}/" \;
              fi
              printf 'y\n' | /opt/bitnami/valkey/bin/valkey-check-aof --fix "${manifest}"
              touch "${marker}"
          volumeMounts:
            - name: valkey-data
              mountPath: /data
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: valkey-data-n8n-valkey-primary-0
