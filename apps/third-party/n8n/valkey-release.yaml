apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n-valkey
  namespace: n8n
spec:
  interval: 15m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: valkey
    namespace: flux-system
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: docker.io
      repository: bitnamilegacy/valkey
      tag: 8.1.2-debian-12-r0
    # Authentication configuration
    auth:
      enabled: true
      password: "" # Will be set via existingSecret
      existingSecret: n8n-valkey-auth
      existingSecretPasswordKey: password

    # Architecture - standalone for simplicity
    architecture: standalone

    # Master/Primary configuration
    primary:
      persistence:
        enabled: true
        # Keep the live StatefulSet claim template unchanged. The existing PVC
        # was originally provisioned as 2Gi on longhorn-single-replica.
        size: 8Gi

      # One-time recovery for the corrupt AOF discovered on 2026-07-14.
      # Remove this init container after Valkey has recovered successfully.
      initContainers:
        - name: repair-aof-20260714
          image: docker.io/bitnamilegacy/valkey:8.1.2-debian-12-r0
          command: ["/bin/bash", "-ec"]
          args:
            - |
              marker=/data/.aof-repaired-20260714
              manifest="$(find /data -name appendonly.aof.manifest -print -quit)"

              if [[ -f "${marker}" ]]; then
                echo "AOF repair already completed"
                exit 0
              fi

              test -n "${manifest}"
              source_dir="$(dirname "${manifest}")"
              backup="${source_dir}.backup-20260714"
              echo "Repairing ${manifest}"
              if [[ ! -e "${backup}" ]]; then
                cp -a "${source_dir}" "${backup}"
              fi
              printf 'y\n' | /opt/bitnami/valkey/bin/valkey-check-aof --fix "${manifest}"
              touch "${marker}"
          volumeMounts:
            - name: valkey-data
              mountPath: /data

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Metrics configuration
    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis-exporter
        tag: 1.74.0-debian-12-r1
      serviceMonitor:
        enabled: true

    # Network policy
    networkPolicy:
      enabled: false

    # Service configuration
    service:
      type: ClusterIP
      ports:
        valkey: 6379
