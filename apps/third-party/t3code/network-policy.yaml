apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: t3code-ingress
  namespace: t3code
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: t3code
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3773
