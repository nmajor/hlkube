apiVersion: apps/v1
kind: Deployment
metadata:
  name: t3code
  namespace: t3code
  labels:
    app.kubernetes.io/name: t3code
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: t3code
  template:
    metadata:
      labels:
        app.kubernetes.io/name: t3code
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: t3code
          image: ghcr.io/nmajor/coder-workspace-t3code:0.0.28@sha256:8a722e55bd866a9d6bc0961d4b5e58eb235c40b7e5d9cf2d7c4fa8b4019b2abf
          imagePullPolicy: IfNotPresent
          command:
            - t3
          args:
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "3773"
            - --base-dir
            - /home/coder/.t3
            - /home/coder/workspace
          workingDir: /home/coder/workspace
          env:
            - name: HOME
              value: /home/coder
            - name: T3CODE_HOME
              value: /home/coder/.t3
            - name: T3CODE_NO_BROWSER
              value: "1"
          ports:
            - name: http
              containerPort: 3773
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: home
              mountPath: /home/coder
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: t3code-home
