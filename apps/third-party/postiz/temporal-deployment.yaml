apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: postiz
  labels:
    app: postiz
    component: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postiz
      component: temporal
  template:
    metadata:
      labels:
        app: postiz
        component: temporal
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.26.2
          ports:
            - containerPort: 7233
              name: grpc
          env:
            - name: DB
              value: "postgres12"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: "temporal-postgres-rw.postiz.svc.cluster.local"
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgres-credentials
                  key: password
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: "config/dynamicconfig/development-sql.yaml"
            - name: SKIP_SCHEMA_SETUP
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
