apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz
  namespace: postiz
  labels:
    app: postiz
    component: main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postiz
      component: main
  template:
    metadata:
      labels:
        app: postiz
        component: main
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-04-08T15:35:00Z"
    spec:
      enableServiceLinks: false
      initContainers:
        - name: create-env
          image: busybox:1.36
          command: ["sh", "-c", "touch /app-env/.env"]
          volumeMounts:
            - name: env-file
              mountPath: /app-env
      containers:
        - name: postiz
          image: ghcr.io/gitroomhq/postiz-app:v2.21.4
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: redis_url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: jwt_secret
            - name: FRONTEND_URL
              value: "https://postiz.nmajor.net"
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "https://postiz.nmajor.net/api"
            - name: BACKEND_INTERNAL_URL
              value: "http://localhost:3000"
            - name: TEMPORAL_ADDRESS
              value: "temporal.postiz.svc.cluster.local:7233"
            - name: IS_GENERAL
              value: "true"
            - name: STORAGE_PROVIDER
              value: "local"
            - name: UPLOAD_DIRECTORY
              value: "/uploads"
            - name: NEXT_PUBLIC_UPLOAD_DIRECTORY
              value: "/uploads"
          volumeMounts:
            - name: uploads
              mountPath: /uploads
            - name: config
              mountPath: /config
            - name: env-file
              mountPath: /app/.env
              subPath: .env
          resources:
            requests:
              cpu: 750m
              memory: 1.5Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          startupProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: postiz-uploads
        - name: config
          persistentVolumeClaim:
            claimName: postiz-config
        - name: env-file
          emptyDir: {}
