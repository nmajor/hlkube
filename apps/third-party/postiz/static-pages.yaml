    <body>
      <h1>Terms of Service</h1>
      <p class="date">Effective date: April 8, 2026</p>

      <h2>1. Acceptance of Terms</h2>
      <p>By accessing or using the social media management service ("Service") available at postiz.nmajor.net and operated by NMajor Studios LLC ("Company", "we", "us", "our"), you agree to be bound by these Terms of Service ("Terms"). If you do not agree to these Terms, do not use the Service.</p>

      <h2>2. Description of Service</h2>
      <p>The Service is a social media scheduling, publishing, analytics, and management platform. It allows authorized users to connect their accounts on third-party platforms &mdash; including but not limited to Facebook, Instagram, LinkedIn, X (formerly Twitter), TikTok, YouTube, Reddit, Pinterest, Threads, Bluesky, and Mastodon &mdash; and to create, schedule, and publish content to those platforms through the Service.</p>

      <h2>3. Eligibility and Access</h2>
      <p>The Service is provided for private, authorized use only. You must be at least 13 years of age (or the minimum age required in your jurisdiction) to use the Service. Access is by invitation and is not open to the general public. We reserve the right to refuse access to anyone at our sole discretion.</p>

      <h2>4. User Accounts</h2>
      <p>You are responsible for maintaining the confidentiality of your account credentials and for all activity under your account. You agree to provide accurate, current, and complete information when creating an account and to update it as necessary. You must notify us immediately of any unauthorized use of your account.</p>

      <h2>5. Connected Third-Party Platforms</h2>
      <p>When you connect a third-party social media account to the Service, you authorize us to access that platform on your behalf using the permissions you grant (via OAuth or similar authorization mechanisms). You acknowledge that:</p>
      <ul>
        <li>Your use of each third-party platform is subject to that platform's own terms of service and policies</li>
        <li>We act solely as your agent when transmitting content to connected platforms</li>
        <li>We are not responsible for changes to third-party platform APIs, policies, or availability</li>
        <li>You may revoke access to any connected platform at any time through the Service or through the platform directly</li>
      </ul>

      <h3>Platform-Specific Terms</h3>
      <p>By using the Service with the following platforms, you also agree to their respective terms:</p>
      <ul>
        <li><strong>Facebook &amp; Instagram:</strong> <a href="https://www.facebook.com/terms.php" rel="noopener">Meta Terms of Service</a> and <a href="https://developers.facebook.com/terms/" rel="noopener">Meta Platform Terms</a></li>
        <li><strong>YouTube:</strong> <a href="https://www.youtube.com/t/terms" rel="noopener">YouTube Terms of Service</a>. By using YouTube features of the Service, you are also agreeing to be bound by the YouTube Terms of Service.</li>
        <li><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/legal/user-agreement" rel="noopener">LinkedIn User Agreement</a></li>
        <li><strong>X (Twitter):</strong> <a href="https://x.com/en/tos" rel="noopener">X Terms of Service</a></li>
        <li><strong>TikTok:</strong> <a href="https://www.tiktok.com/legal/terms-of-service" rel="noopener">TikTok Terms of Service</a></li>
        <li><strong>Reddit:</strong> <a href="https://www.redditinc.com/policies/user-agreement" rel="noopener">Reddit User Agreement</a></li>
        <li><strong>Pinterest:</strong> <a href="https://policy.pinterest.com/en/terms-of-service" rel="noopener">Pinterest Terms of Service</a></li>
      </ul>

      <h2>6. Acceptable Use</h2>
      <p>You agree not to use the Service to:</p>
      <ul>
        <li>Violate any applicable local, national, or international law or regulation</li>
        <li>Post or distribute spam, misleading, defamatory, or harmful content</li>
        <li>Infringe on the intellectual property rights of any third party</li>
        <li>Interfere with or disrupt the Service, its servers, or connected networks</li>
        <li>Attempt to gain unauthorized access to any part of the Service</li>
        <li>Violate the terms, policies, or guidelines of any connected third-party platform</li>
        <li>Use the Service for surveillance, profiling, or discrimination against any individual or group</li>
        <li>Collect, store, or process data obtained through the Service in violation of applicable privacy laws</li>
      </ul>

      <h2>7. Content Ownership</h2>
      <p>You retain full ownership of all content you create, upload, or publish through the Service. By using the Service, you grant us a limited, non-exclusive, royalty-free license to process, store, and transmit your content solely for the purpose of providing and operating the Service. This license terminates when you delete your content or your account.</p>

      <h2>8. Data Deletion and Account Termination</h2>
      <p>You may request deletion of your account and all associated data at any time by using the account deletion feature in the Service. Upon account deletion:</p>
      <ul>
        <li>All stored personal data, content, scheduling data, and OAuth tokens will be permanently deleted within 30 days</li>
        <li>Data that has already been published to third-party platforms is governed by those platforms' policies and is outside our control</li>
        <li>Anonymized, aggregated data that cannot identify you may be retained for operational purposes</li>
      </ul>

      <h2>9. Disclaimer of Warranties</h2>
      <p>THE SERVICE IS PROVIDED "AS IS" AND "AS AVAILABLE" WITHOUT WARRANTIES OF ANY KIND, WHETHER EXPRESS, IMPLIED, OR STATUTORY. WE DISCLAIM ALL WARRANTIES, INCLUDING BUT NOT LIMITED TO IMPLIED WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE, AND NON-INFRINGEMENT. WE DO NOT WARRANT THAT THE SERVICE WILL BE UNINTERRUPTED, TIMELY, SECURE, OR ERROR-FREE.</p>

      <h2>10. Limitation of Liability</h2>
      <p>TO THE MAXIMUM EXTENT PERMITTED BY APPLICABLE LAW, NMAJOR STUDIOS LLC SHALL NOT BE LIABLE FOR ANY INDIRECT, INCIDENTAL, SPECIAL, CONSEQUENTIAL, OR PUNITIVE DAMAGES, INCLUDING BUT NOT LIMITED TO LOSS OF PROFITS, DATA, USE, OR GOODWILL, ARISING OUT OF OR IN CONNECTION WITH YOUR USE OF THE SERVICE, WHETHER BASED ON WARRANTY, CONTRACT, TORT, OR ANY OTHER LEGAL THEORY.</p>

      <h2>11. Indemnification</h2>
      <p>You agree to indemnify, defend, and hold harmless NMajor Studios LLC from and against any claims, liabilities, damages, losses, and expenses arising out of or in connection with your use of the Service, your violation of these Terms, or your violation of any rights of a third party.</p>

      <h2>12. Termination</h2>
      <p>We reserve the right to suspend or terminate your access to the Service at any time, with or without cause, and with or without notice. Upon termination, your right to use the Service ceases immediately. Sections 9, 10, 11, and 12 survive termination.</p>

      <h2>13. Changes to These Terms</h2>
      <p>We may update these Terms from time to time by posting the revised Terms on this page with an updated effective date. Your continued use of the Service after such changes constitutes your acceptance of the revised Terms.</p>

      <h2>14. Governing Law</h2>
      <p>These Terms are governed by and construed in accordance with the laws of the United States, without regard to conflict of law principles.</p>

      <h2>15. Contact</h2>
      <p>If you have questions about these Terms, you may reach us through the account settings within the Service.</p>

      <p style="margin-top: 3rem; color: #666; font-size: 0.9rem;">&copy; 2026 NMajor Studios LLC. All rights reserved.</p>
    </body>
    </html>
