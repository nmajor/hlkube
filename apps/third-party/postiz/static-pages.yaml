    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Privacy Policy - NMajor Studios LLC</title>
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 2rem 1rem; line-height: 1.7; color: #e0e0e0; background: #111; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
        h2 { font-size: 1.3rem; margin-top: 2.5rem; color: #fff; }
        h3 { font-size: 1.1rem; margin-top: 1.5rem; color: #ccc; }
        .date { color: #888; margin-bottom: 2rem; }
        a { color: #7c9dff; }
        ul { padding-left: 1.5rem; }
