apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postiz-valkey
  namespace: postiz
spec:
  interval: 15m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: valkey
    namespace: flux-system
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: docker.io
      repository: bitnamilegacy/valkey
      tag: 8.1.2-debian-12-r0
    auth:
      enabled: true
      password: ""
      existingSecret: postiz-valkey-auth
      existingSecretPasswordKey: password
    architecture: standalone
    master:
      persistence:
        enabled: true
        size: 2Gi
        storageClass: longhorn-single-replica
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis-exporter
        tag: 1.74.0-debian-12-r1
      serviceMonitor:
        enabled: true
    networkPolicy:
      enabled: false
    service:
      type: ClusterIP
      ports:
        valkey: 6379
