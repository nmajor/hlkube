apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postiz-postgres-pooler
  namespace: postiz
spec:
  cluster:
    name: postiz-postgres
  type: rw
  instances: 2
  monitoring:
    enablePodMonitor: true
  pgbouncer:
    poolMode: session
    parameters:
      default_pool_size: "25"
      max_client_conn: "150"
