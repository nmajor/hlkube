apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-add-text-columns
  namespace: postiz
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: add-columns
          image: postgres:17
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgres-credentials
                  key: password
          command:
            - sh
            - -c
            - |
              psql -h temporal-postgres-rw.postiz.svc.cluster.local -U temporal -d temporal_visibility -c "
                DO \$\$
                BEGIN
                  -- Add text04 through text10 generated columns
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text04') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text04 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text04')::tsvector) STORED;
                    CREATE INDEX by_text_04 ON executions_visibility USING gin (namespace_id, text04);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text05') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text05 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text05')::tsvector) STORED;
                    CREATE INDEX by_text_05 ON executions_visibility USING gin (namespace_id, text05);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text06') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text06 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text06')::tsvector) STORED;
                    CREATE INDEX by_text_06 ON executions_visibility USING gin (namespace_id, text06);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text07') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text07 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text07')::tsvector) STORED;
                    CREATE INDEX by_text_07 ON executions_visibility USING gin (namespace_id, text07);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text08') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text08 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text08')::tsvector) STORED;
                    CREATE INDEX by_text_08 ON executions_visibility USING gin (namespace_id, text08);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text09') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text09 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text09')::tsvector) STORED;
                    CREATE INDEX by_text_09 ON executions_visibility USING gin (namespace_id, text09);
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='executions_visibility' AND column_name='text10') THEN
                    ALTER TABLE executions_visibility ADD COLUMN text10 tsvector GENERATED ALWAYS AS ((search_attributes ->> 'Text10')::tsvector) STORED;
                    CREATE INDEX by_text_10 ON executions_visibility USING gin (namespace_id, text10);
                  END IF;
                END
                \$\$;
              "
