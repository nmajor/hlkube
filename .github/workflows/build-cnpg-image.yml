name: Build CNPG TimescaleDB Image

on:
  push:
    branches: [main]
    paths: ['images/cnpg-timescaledb/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cnpg-timescaledb

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect PostgreSQL version
        id: pgversion
        run: |
          PG_VERSION=$(docker run --rm ghcr.io/imusmanmalik/timescaledb-postgis:17-3.5-109 pg_config --version | sed -n 's/PostgreSQL \([0-9]*\.[0-9]*\).*/\1/p' | tr -d '[:space:]')
          echo "version=${PG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected PG version: ${PG_VERSION}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.pgversion.outputs.version }}
            type=sha,prefix=${{ steps.pgversion.outputs.version }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/cnpg-timescaledb
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
